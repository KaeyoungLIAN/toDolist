<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GlassTodo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="titlebar" data-tauri-drag-region>
  <span id="title-text">GlassTodo</span>
  <div id="title-controls">
    <button class="title-btn" id="pin-btn" title="Pin window">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    </button>
    <button class="title-btn" id="min-btn" title="Minimize">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="title-btn close-btn" id="close-btn" title="Hide to tray">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<div id="datebar">
  <div id="date-nav">
    <button class="nav-btn" id="prev-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="date-display"></span>
    <button class="nav-btn" id="next-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button id="today-btn">Today</button>
  </div>
  <button id="refresh-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
  </button>
</div>

<div id="task-area">
  <div id="task-list">
    <div class="empty-state" id="empty-state">
      <svg class="empty-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="empty-text">No tasks yet, add one below</span>
    </div>
  </div>
</div>

<div id="bottom-panel">
  <div id="input-row">
    <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
    <button id="add-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span id="add-btn-text">Add</span>
    </button>
  </div>
  <div id="reminder-type">
    <label class="radio-label">
      <input type="radio" name="rtype" value="once" checked>
      <span class="radio-dot"></span>
      <span>One-time</span>
    </label>
    <label class="radio-label">
      <input type="radio" name="rtype" value="weekly">
      <span class="radio-dot"></span>
      <span>Weekly</span>
    </label>
  </div>
  <div id="once-config" class="config-row">
    <input type="date" id="once-date">
    <svg class="clock-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <input type="time" id="once-time" value="14:30">
  </div>
  <div id="weekly-config" class="config-row" style="display:none">
    <span class="label">Days:</span>
    <div id="day-btns">
      <button class="day-btn" data-day="1">M</button>
      <button class="day-btn" data-day="2">T</button>
      <button class="day-btn" data-day="3">W</button>
      <button class="day-btn" data-day="4">T</button>
      <button class="day-btn" data-day="5">F</button>
      <button class="day-btn" data-day="6">S</button>
      <button class="day-btn" data-day="0">S</button>
    </div>
    <svg class="clock-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <input type="time" id="weekly-time" value="09:00">
  </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
